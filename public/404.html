<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        var repoBase = "/Netflix-Portfolio-PM";
        var path = window.location.pathname;

        if (path.indexOf(repoBase) === 0) {
          path = path.slice(repoBase.length);
        }

        var redirectPath = repoBase + "/?/" + path.replace(/^\//, "");
        var search = window.location.search
          ? "&" + window.location.search.slice(1).replace(/&/g, "~and~")
          : "";
        var hash = window.location.hash;

        window.location.replace(redirectPath + search + hash);
      })();
    </script>
  </head>
  <body></body>
</html>
