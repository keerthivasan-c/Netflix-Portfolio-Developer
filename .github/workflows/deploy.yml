name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          REACT_APP_DATOCMS_ROR_TOKEN: ${{ secrets.REACT_APP_DATOCMS_ROR_TOKEN }}
          REACT_APP_DATOCMS_JAVA_TOKEN: ${{ secrets.REACT_APP_DATOCMS_JAVA_TOKEN }}
          REACT_APP_DATOCMS_FRONTEND_TOKEN: ${{ secrets.REACT_APP_DATOCMS_FRONTEND_TOKEN }}
          REACT_APP_DATOCMS_NODE_TOKEN: ${{ secrets.REACT_APP_DATOCMS_NODE_TOKEN }}

      - name: Support client-side routing
        run: cp build/index.html build/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
